name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pandas rapidfuzz httpx openpyxl

      - name: Rebuild site/data.json
        run: python scripts/build_site_data.py --data data --out site/data.json

      - name: Ensure Pages project exists
        run: |
          if ! npx -y wrangler@4 pages project list 2>/dev/null | grep -q "mount-readmore"; then
            npx -y wrangler@4 pages project create mount-readmore --production-branch=main
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy site --project-name=mount-readmore --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

      - name: Attach domain + create DNS
        if: github.ref == 'refs/heads/main'
        env:
          PROJECT: mount-readmore
          ZONE: tomgarske.com
          DOMAIN: readmore.tomgarske.com
        run: |
          ZONE_ID=$(curl -sS "https://api.cloudflare.com/client/v4/zones?name=$ZONE" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print(r['result'][0]['id'] if r.get('result') else '')")
          curl -sS -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"name\":\"$DOMAIN\"}" \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print('attach:', 'OK' if r.get('success') else r.get('errors'))"
          curl -sS -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"$DOMAIN\",\"content\":\"$PROJECT.pages.dev\",\"proxied\":true,\"comment\":\"Pages\"}" \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print('dns:   ', 'OK' if r.get('success') else r.get('errors'))"
