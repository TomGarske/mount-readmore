name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install pandas rapidfuzz httpx openpyxl

      - name: Rebuild site/data.json
        run: python scripts/build_site_data.py --data data --out site/data.json

      - name: Ensure Pages project exists
        run: |
          if ! npx -y wrangler@4 pages project list 2>/dev/null | grep -q "mount-readmore"; then
            npx -y wrangler@4 pages project create mount-readmore --production-branch=main
          fi

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: pages deploy site --project-name=mount-readmore --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true

      - name: Attach custom domain
        if: github.ref == 'refs/heads/main'
        run: |
          curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/mount-readmore/domains" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"readmore.tomgarske.com"}' \
            | python3 -c "import json,sys; r=json.load(sys.stdin); print('OK' if r.get('success') else 'INFO: '+'; '.join(e.get('message','') for e in r.get('errors',[])))"
