<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mount Readmore</title>
<link rel="stylesheet" href="styles.css?v=20260519aw">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 32 28" width="28" height="24" xmlns="http://www.w3.org/2000/svg"><defs><mask id="brandMarkLines"><rect width="32" height="28" fill="white"/><path d="M 19 9.95 C 21.3 8.81 25.3 8.81 27 9.95 L 27 11.03 C 25.3 9.89 21.3 9.89 19 11.03 Z" fill="black"/><path d="M 19 13.25 C 21.3 12.11 25.3 12.11 27 13.25 L 27 14.33 C 25.3 13.19 21.3 13.19 19 14.33 Z" fill="black"/><path d="M 19 16.55 C 21.3 15.41 25.3 15.41 27 16.55 L 27 17.63 C 25.3 16.49 21.3 16.49 19 17.63 Z" fill="black"/></mask></defs><path d="M 16 26 L 16 6 C 12 4 5 4 2 6 L 2 22 C 5 20 12 20 16 22 Z" fill="#c6444f"/><path d="M 16 26 L 16 6 C 20 4 27 4 30 6 L 30 22 C 27 20 20 20 16 22 Z" fill="#2c5d96" mask="url(#brandMarkLines)"/></svg></span>
    <a href="#/" class="brand-name">
      <span class="brand-title">Readmore</span>
      <span class="brand-sub">Hugo &amp; Nebula winners</span>
    </a>
  </div>
  <nav class="nav">
    <a href="#/discover" data-route="discover" id="nav-discover">Sort</a>
    <a href="#/stats" data-route="stats">Stats</a>
    <a href="#/search" data-route="list">Search</a>
    <a href="#/collections" data-route="magazines">Collections</a>
    <span id="auth-slot" class="auth-slot"></span>
  </nav>
</header>

<main id="main">
  <div id="view-list" class="view">
    <aside class="filters">
      <div class="search-box">
        <input type="search" id="search" placeholder="Search title or author…" autocomplete="off">
      </div>

      <fieldset class="reader-filter" data-reader="tom">
        <legend>Tom</legend>
        <label><input type="checkbox" name="read-tom" value="read" checked> Read</label>
        <label><input type="checkbox" name="read-tom" value="unread" checked> Unread</label>
        <label><input type="checkbox" name="read-tom" value="started" checked> Started/queued</label>
      </fieldset>

      <fieldset class="reader-filter" data-reader="nika">
        <legend>Nika</legend>
        <label><input type="checkbox" name="read-nika" value="read" checked> Read</label>
        <label><input type="checkbox" name="read-nika" value="unread" checked> Unread</label>
        <label><input type="checkbox" name="read-nika" value="started" checked> Started/queued</label>
      </fieldset>

      <fieldset class="reader-filter" data-reader="westdac">
        <legend>Westdac</legend>
        <label><input type="checkbox" name="read-westdac" value="read" checked> Read</label>
        <label><input type="checkbox" name="read-westdac" value="unread" checked> Unread</label>
        <label><input type="checkbox" name="read-westdac" value="started" checked> Started/queued</label>
      </fieldset>

      <fieldset class="reader-filter" data-reader="colton">
        <legend>Colton</legend>
        <label><input type="checkbox" name="read-colton" value="read" checked> Read</label>
        <label><input type="checkbox" name="read-colton" value="unread" checked> Unread</label>
        <label><input type="checkbox" name="read-colton" value="started" checked> Started/queued</label>
      </fieldset>

      <fieldset class="reader-filter" data-reader="schupp">
        <legend>Schupp</legend>
        <label><input type="checkbox" name="read-schupp" value="read" checked> Read</label>
        <label><input type="checkbox" name="read-schupp" value="unread" checked> Unread</label>
        <label><input type="checkbox" name="read-schupp" value="started" checked> Started/queued</label>
      </fieldset>

      <fieldset>
        <legend>Award</legend>
        <label><input type="checkbox" name="award" value="hugo" checked> Hugo</label>
        <label><input type="checkbox" name="award" value="nebula" checked> Nebula</label>
      </fieldset>

      <fieldset>
        <legend>Status</legend>
        <label><input type="checkbox" name="status" value="winner" checked> Winner</label>
        <label><input type="checkbox" name="status" value="nominee" checked> Nominee</label>
      </fieldset>

      <fieldset>
        <legend>Category</legend>
        <label><input type="checkbox" name="category" value="Novel" checked> Novel</label>
        <label><input type="checkbox" name="category" value="Novella" checked> Novella</label>
        <label><input type="checkbox" name="category" value="Novelette" checked> Novelette</label>
      </fieldset>

      <fieldset>
        <legend>Year range</legend>
        <div class="year-row">
          <input type="number" id="year-min" placeholder="from" min="1900" max="2100">
          <span>–</span>
          <input type="number" id="year-max" placeholder="to" min="1900" max="2100">
        </div>
      </fieldset>

      <fieldset id="me-status-fieldset" hidden>
        <legend>Your status</legend>
        <label><input type="checkbox" name="me-status" value="read" checked> Read</label>
        <label><input type="checkbox" name="me-status" value="nightstand" checked> Nightstand</label>
        <label><input type="checkbox" name="me-status" value="neither" checked> Neither</label>
      </fieldset>

      <fieldset>
        <legend>Author gender</legend>
        <label><input type="checkbox" name="author-gender" value="female" checked> Female-authored</label>
        <label><input type="checkbox" name="author-gender" value="male" checked> Male-authored</label>
        <label><input type="checkbox" name="author-gender" value="unknown" checked> Unknown / pen name</label>
      </fieldset>

      <fieldset>
        <legend>Availability</legend>
        <label><input type="checkbox" id="filter-read-free"> Read free online</label>
      </fieldset>

      <fieldset class="debug-filter">
        <legend>Debug: missing data</legend>
        <label><input type="checkbox" name="missing" value="desc"> Missing description</label>
        <label><input type="checkbox" name="missing" value="author-image"> Authors missing image</label>
        <label><input type="checkbox" name="missing" value="link"> Missing read link</label>
      </fieldset>

      <button id="reset" type="button">Reset filters</button>
    </aside>

    <section class="results">
      <div class="results-header">
        <div class="search-mode-tabs">
          <button class="search-mode-tab active" id="search-tab-books" data-mode="books">Books</button>
          <button class="search-mode-tab" id="search-tab-authors" data-mode="authors">Authors</button>
        </div>
        <span id="result-count"></span>
        <select id="sort">
          <option value="year-desc">Year ↓</option>
          <option value="year-asc">Year ↑</option>
          <option value="title">Title A–Z</option>
          <option value="author">Author A–Z</option>
        </select>
      </div>
      <div id="grid" class="grid"></div>
    </section>
  </div>

  <div id="view-detail" class="view hidden"></div>
  <div id="view-stats" class="view hidden"></div>
  <div id="view-genre" class="view hidden"></div>
  <div id="view-hugo2026" class="view hidden"></div>
  <div id="view-nebula2026" class="view hidden"></div>
  <div id="view-compare" class="view hidden"></div>
  <div id="view-authors" class="view hidden"></div>
  <div id="view-friends" class="view hidden"></div>
  <div id="view-discover" class="view hidden"></div>
  <div id="view-magazines" class="view hidden"></div>
  <div id="view-settings" class="view hidden"></div>
  <div id="view-admin" class="view hidden"></div>
  <div id="view-profile" class="view hidden"></div>
</main>

<footer class="footer">
  <span>Hugo &amp; Nebula completionist tracker</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js?v=20260519aw"></script>
<script src="auth.js?v=20260519aw"></script>
<script src="app.js?v=20260519aw"></script>
</body>
</html>
